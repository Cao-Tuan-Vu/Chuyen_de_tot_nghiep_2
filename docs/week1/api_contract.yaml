openapi: 3.0.3
info:
  title: BTL API
  version: 1.1.0-week5
servers:
  - url: http://localhost:3000
paths:
  /health:
    get:
      summary: Health check
      responses:
        '200':
          description: OK
  /api/v1/auth/register:
    post:
      summary: Register account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password, displayName]
              properties:
                email: { type: string, format: email }
                password: { type: string, minLength: 6 }
                displayName: { type: string }
      responses:
        '201':
          description: Created
  /api/v1/auth/login:
    post:
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email: { type: string, format: email }
                password: { type: string }
      responses:
        '200':
          description: Success
  /api/v1/profile/me:
    get:
      security: [{ bearerAuth: [] }]
      summary: Get current profile
      responses:
        '200': { description: Success }
    patch:
      security: [{ bearerAuth: [] }]
      summary: Update current profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [displayName]
              properties:
                displayName: { type: string }
      responses:
        '200': { description: Success }
  /api/v1/profile/role:
    patch:
      security: [{ bearerAuth: [] }]
      summary: Admin updates user role
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [userId, role]
              properties:
                userId: { type: string }
                role:
                  type: string
                  enum: [student, mentor, admin]
      responses:
        '200': { description: Success }

  /api/v1/courses:
    get:
      summary: List all courses
      responses:
        '200':
          description: Success

  /api/v1/courses/{courseId}/lessons:
    get:
      summary: List lessons of a course
      parameters:
        - in: path
          name: courseId
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Success
        '404':
          description: Course not found

  /api/v1/courses/{courseId}/lessons/{lessonId}:
    get:
      summary: Get lesson detail
      parameters:
        - in: path
          name: courseId
          required: true
          schema: { type: string }
        - in: path
          name: lessonId
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Success
        '404':
          description: Lesson not found

  /api/v1/quizzes/{quizId}:
    get:
      summary: Get quiz without exposing correct answers
      parameters:
        - in: path
          name: quizId
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Success
        '404':
          description: Quiz not found

  /api/v1/quizzes/{quizId}/submit:
    post:
      security: [{ bearerAuth: [] }]
      summary: Submit quiz attempt and get graded result
      parameters:
        - in: path
          name: quizId
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [answers]
              properties:
                answers:
                  type: object
                  additionalProperties:
                    type: integer
      responses:
        '200':
          description: Success
        '400':
          description: Invalid payload
        '401':
          description: Unauthorized
        '404':
          description: Quiz not found

  /api/v1/quizzes/{quizId}/attempts/me:
    get:
      security: [{ bearerAuth: [] }]
      summary: Get current user attempts by quiz
      parameters:
        - in: path
          name: quizId
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Success
        '401':
          description: Unauthorized

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

